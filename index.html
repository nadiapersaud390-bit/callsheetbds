<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CallDesk — Daily Report</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f1117;
    color: #e2e8f0;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  .topbar {
    background: #161b27;
    border-bottom: 1px solid #1e2a3a;
    padding: 0 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 62px;
  }

  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-dot {
    width: 9px; height: 9px;
    background: #3b82f6;
    border-radius: 50%;
    box-shadow: 0 0 10px rgba(59,130,246,0.7);
  }
  .brand span { color: #f1f5f9; font-weight: 700; font-size: 15px; }
  .brand small { color: #475569; font-size: 12px; font-weight: 400; margin-left: 6px; }

  .clock { text-align: right; }
  #live-clock { color: #f1f5f9; font-size: 17px; font-weight: 700; font-variant-numeric: tabular-nums; }
  #live-date  { color: #475569; font-size: 11px; margin-top: 2px; }

  .main { max-width: 720px; margin: 0 auto; padding: 32px 20px 80px; }

  .card {
    background: #161b27;
    border: 1px solid #1e2a3a;
    border-radius: 14px;
    margin-bottom: 16px;
    overflow: hidden;
  }

  .card-head {
    padding: 16px 22px;
    border-bottom: 1px solid #1e2a3a;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .head-icon {
    width: 34px; height: 34px;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }

  .hi-blue   { background: rgba(59,130,246,0.12); }
  .hi-teal   { background: rgba(20,184,166,0.12); }

  .card-head h2 { font-size: 14px; font-weight: 600; color: #f1f5f9; }
  .card-head p  { font-size: 12px; color: #475569; margin-top: 2px; }

  .card-body { padding: 22px; }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media(max-width:520px) { .row2 { grid-template-columns: 1fr; } }

  .field { display: flex; flex-direction: column; gap: 6px; }

  label { font-size: 12px; font-weight: 500; color: #94a3b8; }
  label .req { color: #f87171; margin-left: 2px; }

  input, select, textarea {
    background: #0f1117;
    border: 1px solid #1e2a3a;
    border-radius: 8px;
    color: #e2e8f0;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    width: 100%;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  input:focus, select:focus, textarea:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
  }

  input::placeholder, textarea::placeholder { color: #334155; }
  select option { background: #161b27; color: #e2e8f0; }
  textarea { resize: vertical; min-height: 65px; }

  /* LOG CALL BUTTON */
  .btn-log {
    width: 100%;
    margin-top: 18px;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    border: none;
    border-radius: 10px;
    color: #fff;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 14px;
    transition: all 0.2s;
    box-shadow: 0 4px 14px rgba(37,99,235,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-log:hover:not(:disabled) {
    background: linear-gradient(135deg, #1d4ed8, #1e40af);
    box-shadow: 0 6px 20px rgba(37,99,235,0.35);
    transform: translateY(-1px);
  }

  .btn-log:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  /* STATUS TOAST */
  #toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #161b27;
    border: 1px solid #1e2a3a;
    border-radius: 10px;
    padding: 13px 22px;
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    transition: transform 0.3s ease, opacity 0.3s ease;
    opacity: 0;
    z-index: 999;
    white-space: nowrap;
  }

  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  #toast.success { border-color: rgba(20,184,166,0.4); color: #2dd4bf; }
  #toast.error   { border-color: rgba(248,113,113,0.4); color: #f87171; }

  /* LOGGED CALLS LIST */
  .logged-section { margin-top: 6px; }

  .logged-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .logged-title {
    font-size: 12px;
    font-weight: 600;
    color: #475569;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .count-badge {
    background: rgba(59,130,246,0.12);
    color: #60a5fa;
    border: 1px solid rgba(59,130,246,0.2);
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
  }

  .logged-empty {
    text-align: center;
    padding: 28px 20px;
    color: #334155;
    font-size: 13px;
    border: 1px dashed #1e2a3a;
    border-radius: 10px;
  }

  .logged-item {
    background: #0f1117;
    border: 1px solid #1e2a3a;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    animation: fadeUp 0.2s ease;
  }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(6px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .logged-num {
    background: rgba(59,130,246,0.12);
    color: #60a5fa;
    border: 1px solid rgba(59,130,246,0.15);
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 9px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .logged-info { flex: 1; }

  .logged-reason {
    font-size: 13px;
    font-weight: 600;
    color: #e2e8f0;
    margin-bottom: 4px;
  }

  .logged-meta {
    font-size: 11px;
    color: #475569;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .logged-meta span { display: flex; align-items: center; gap: 4px; }

  .logged-notes {
    font-size: 12px;
    color: #64748b;
    margin-top: 6px;
    font-style: italic;
  }

  .logged-check {
    color: #2dd4bf;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-dot"></div>
    <span>CallDesk <small>/ Daily Call Log</small></span>
  </div>
  <div class="clock">
    <div id="live-clock">--:--:--</div>
    <div id="live-date"></div>
  </div>
</div>

<div class="main">

  <!-- AGENT INFO -->
  <div class="card">
    <div class="card-head">
      <div class="head-icon hi-blue">👤</div>
      <div>
        <h2>Your Information</h2>
        <p>Fill in once — stays saved all day</p>
      </div>
    </div>
    <div class="card-body">
      <div class="row2">
        <div class="field">
          <label>Full Name <span class="req">*</span></label>
          <input type="text" id="agent-name" placeholder="Jane Smith"/>
        </div>
        <div class="field">
          <label>Agent ID <span class="req">*</span></label>
          <input type="text" id="agent-id" placeholder="AGT-001"/>
        </div>
      </div>
    </div>
  </div>

  <!-- LOG A CALL -->
  <div class="card">
    <div class="card-head">
      <div class="head-icon hi-teal">📞</div>
      <div>
        <h2>Log a Call</h2>
        <p>Fill in and click "Log Call" — sends instantly to Google Sheets</p>
      </div>
    </div>
    <div class="card-body">
      <div class="row2" style="margin-bottom:14px;">
        <div class="field">
          <label>Caller Phone / ID</label>
          <input type="text" id="call-phone" placeholder="+1 555 000 1234"/>
        </div>
        <div class="field">
          <label>Reason Not Converted <span class="req">*</span></label>
          <select id="call-reason">
            <option value="" disabled selected>Select a reason…</option>
            <option>Price too high</option>
            <option>Not the decision maker</option>
            <option>Already has a competitor solution</option>
            <option>No budget right now</option>
            <option>Not interested / no need</option>
            <option>Requested callback later</option>
            <option>Wrong number / not the right person</option>
            <option>Language barrier</option>
            <option>Call dropped / disconnected</option>
            <option>Customer was rude / hostile</option>
            <option>Product doesn't fit their needs</option>
            <option>Needs more time to decide</option>
            <option>Other</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Notes <span style="color:#475569;font-weight:400;">(optional)</span></label>
        <textarea id="call-notes" placeholder="Brief notes about this call…"></textarea>
      </div>

      <button class="btn-log" id="log-btn" onclick="logCall()">
        <div class="btn-spinner" id="btn-spinner"></div>
        <span id="btn-text">📋 Log Call</span>
      </button>
    </div>
  </div>

  <!-- LOGGED CALLS TODAY -->
  <div class="card">
    <div class="card-head">
      <div class="head-icon hi-blue">✅</div>
      <div>
        <h2>Logged Today</h2>
        <p>All calls sent to Google Sheets this session</p>
      </div>
    </div>
    <div class="card-body">
      <div class="logged-section">
        <div class="logged-header">
          <span class="logged-title">Calls this session</span>
          <span class="count-badge" id="call-count">0 calls</span>
        </div>
        <div id="logged-list">
          <div class="logged-empty">No calls logged yet.</div>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwQhmCDJevVn0eJi_UpAH_Ob5mxgL6VFdw3mHHa3XjTi5_SJvzsjUYRJ1KIBASakbY7/exec";

let loggedCalls = [];

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById("live-clock").textContent =
    now.toLocaleTimeString("en-US", { hour12: true, timeZone: "America/Guyana" });
  document.getElementById("live-date").textContent =
    now.toLocaleDateString("en-US", { weekday:"short", month:"short", day:"numeric", year:"numeric", timeZone: "America/Guyana" });
}
updateClock();
setInterval(updateClock, 1000);

// Toast
function showToast(type, msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `show ${type}`;
  setTimeout(() => { t.className = ""; }, 3500);
}

// Log call
async function logCall() {
  const agentName = document.getElementById("agent-name").value.trim();
  const agentId   = document.getElementById("agent-id").value.trim();
  const phone     = document.getElementById("call-phone").value.trim();
  const reason    = document.getElementById("call-reason").value;
  const notes     = document.getElementById("call-notes").value.trim();
  const now       = new Date();

  if (!agentName || !agentId) {
    showToast("error", "⚠️ Please enter your Name and Agent ID first."); return;
  }
  if (!reason) {
    showToast("error", "⚠️ Please select a reason before logging."); return;
  }

  // Show loading
  document.getElementById("log-btn").disabled = true;
  document.getElementById("btn-spinner").style.display = "block";
  document.getElementById("btn-text").textContent = "Logging…";

  const callData = {
    submittedAt:      now.toISOString(),
    submittedAtLocal: now.toLocaleString("en-US", { timeZone: "America/Guyana" }),
    agentName,
    agentId,
    phone,
    reason,
    notes
  };

  try {
    await fetch(GOOGLE_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify(callData)
    });

    // Add to local logged list
    loggedCalls.push({ ...callData, time: now.toLocaleTimeString("en-US", { hour12: true, timeZone: "America/Guyana" }) });
    renderLogged();

    // Clear the form fields (keep name & ID)
    document.getElementById("call-phone").value = "";
    document.getElementById("call-reason").value = "";
    document.getElementById("call-notes").value = "";

    showToast("success", `✓ Call logged at ${now.toLocaleTimeString("en-US", { hour12: true, timeZone: "America/Guyana" })}`);

  } catch (err) {
    showToast("error", `✗ Failed to log: ${err.message}`);
  }

  document.getElementById("log-btn").disabled = false;
  document.getElementById("btn-spinner").style.display = "none";
  document.getElementById("btn-text").textContent = "📋 Log Call";
}

function renderLogged() {
  const list = document.getElementById("logged-list");
  const count = document.getElementById("call-count");
  count.textContent = `${loggedCalls.length} call${loggedCalls.length !== 1 ? "s" : ""}`;

  if (loggedCalls.length === 0) {
    list.innerHTML = `<div class="logged-empty">No calls logged yet.</div>`;
    return;
  }

  list.innerHTML = loggedCalls.slice().reverse().map((c, i) => `
    <div class="logged-item">
      <span class="logged-num">#${loggedCalls.length - i}</span>
      <div class="logged-info">
        <div class="logged-reason">${c.reason}</div>
        <div class="logged-meta">
          <span>🕐 ${c.time}</span>
          ${c.phone ? `<span>📱 ${c.phone}</span>` : ""}
        </div>
        ${c.notes ? `<div class="logged-notes">${c.notes}</div>` : ""}
      </div>
      <span class="logged-check">✓</span>
    </div>
  `).join("");
}
</script>
</body>
</html>
